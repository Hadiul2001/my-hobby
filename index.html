<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hobby.com</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- photography -->
    <section class="photography">
        <div>
            <div>
                <h1 class="section-header">Photography</h1>
            </div>
            <div class="photo-container">
                <div>
                    <img src="./Photography/pg1.jpg" alt="">
                    <img src="./Photography/pg2.jpg" alt="">
                    <img src="./Photography/pg3.jpg" alt="">
                </div>
                <div>
                    <img src="./Photography/pg4.jpg" alt="">
                    <img src="./Photography/pg5.jpg" alt="">
                    <img src="./Photography/pg6.jpg" alt="">
                </div>
                <div>
                    <img src="./Photography/pg7.jpg" alt="">
                    <img src="./Photography/pg8.jpg" alt="">
                    <img src="./Photography/pg9.jpg" alt="">
                </div>
            </div>
        </div>
    </section>
    <!-- marathon -->
    <section class="marathon">
        <div>
            <h1 class="section-header">Marathon</h1>
        </div>
        <div class="marathon-card-container">
            <div class="marathon-card">
                <img src="./Marathon/DM10k.jpg" alt="">
                    <h2>Time: 1.20 Hour</h2>
                    <h2>Distance: 10km</h2>
                    <h2>Place: Dhaka</h2>
            </div>
            <div class="marathon-card">
                <img src="./Marathon/JM7M.jpg" alt="">
                    <h2>Time: 1 Hour</h2>
                    <h2>Distance: 7km</h2>
                    <h2>Place: Jashore</h2>
            </div>
        </div>
    </section>
</body>

</html>
